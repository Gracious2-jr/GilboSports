<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart | Gilbo Sports Store</title>
<link rel="stylesheet" href="assets/css/style.css">
<link rel="icon" href="data:,">
</head>
<body>

<div id="site-header"></div>

<section class="section">
  <div class="container">
    <div class="section-title">
      <h2>Your Cart</h2>
      <p id="cartCountText"></p>
    </div>

    <p class="text-center" id="cartEmpty" style="padding:40px 0;color:#7c8a86;display:none;">
      Your cart is empty. <br><br><a href="products.html" class="btn btn-primary">Browse Products</a>
    </p>

    <table class="cart-table" id="cartTable" style="display:none;">
      <thead>
        <tr><th>Item</th><th>Unit Price</th><th>Qty</th><th>Line Total</th><th></th></tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="cart-summary" id="cartSummary" style="display:none;">
      <div class="row"><span>Subtotal</span><span id="cartSubtotalDisplay"></span></div>
      <div class="row" style="font-size:12.5px;color:#7c8a86;">Delivery fee (if applicable) confirmed on WhatsApp</div>
      <div class="row total"><span>Total</span><span id="cartTotal"></span></div>
      <a href="checkout.html" class="btn btn-primary" style="width:100%;text-align:center;margin-top:14px;">Proceed to Checkout</a>
    </div>
  </div>
</section>

<div id="site-footer"></div>

<script src="assets/js/data.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/cart.js"></script>
<script src="assets/js/products.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    renderLayout("cart.html");
    renderCartPage();
  });
</script>
</body>
</html>
