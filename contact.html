<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | Gilbo Sports Store</title>
<link rel="stylesheet" href="assets/css/style.css">
<link rel="icon" href="data:,">
</head>
<body>

<div id="site-header"></div>

<section class="section">
  <div class="container" style="max-width:640px;">
    <div class="section-title">
      <h2>Contact Gilbo Sports Store</h2>
      <p>Get an instant automatic reply, then send your message straight to our WhatsApp</p>
    </div>

    <div class="auto-response-box mt-20" id="autoResponseBox" style="display:none;">
      <strong>🤖 Automatic Response</strong>
      <p style="margin-top:8px;" id="autoResponseText"></p>
      <a id="sendWhatsAppInquiryBtn" href="#" target="_blank" rel="noopener" class="btn btn-primary mt-20" style="display:inline-block;">
        💬 Send This Message on WhatsApp
      </a>
    </div>

    <form class="form-card" id="contactForm">
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="contactName" required>
        <div class="form-error"></div>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="contactPhone" required placeholder="e.g. 0700 123 456">
        <div class="form-error"></div>
      </div>
      <div class="form-group">
        <label>Your Message</label>
        <textarea id="contactMessage" rows="5" required placeholder="Ask about price, delivery, stock, size..."></textarea>
        <div class="form-error"></div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Get Instant Response</button>
    </form>

    <div class="text-center mt-20">
      <a id="directWhatsAppLink" href="#" target="_blank" rel="noopener" class="btn btn-outline" style="color:#0b3d2e;border-color:#0b3d2e;">
        💬 Chat With Us on WhatsApp Instead
      </a>
    </div>
    <p class="text-center mt-20" style="font-size:13px;color:#7c8a86;">
      Prefer email? Reach us at <a id="emailLink" href="#" style="color:var(--bright-green);font-weight:600;"></a>
    </p>
  </div>
</section>

<div id="site-footer"></div>

<script src="assets/js/data.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/cart.js"></script>
<script src="assets/js/contact.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    renderLayout("contact.html");
    initContactPage();
    document.getElementById("directWhatsAppLink").href = waLink(SHOP.whatsapp, "Hello Gilbo Sports Store, I have a question about...");
    document.getElementById("emailLink").href = "mailto:" + SHOP.email;
    document.getElementById("emailLink").textContent = SHOP.email;
  });
</script>
</body>
</html>
